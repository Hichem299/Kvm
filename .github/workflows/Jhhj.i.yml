name: Build Kernel for Samsung Galaxy A05s

on:
  workflow_dispatch:
    inputs:
      DEFCONFIG:
        description: 'اسم ملف الـ defconfig الخاص بالهاتف (مثل: vendor/a05s_defconfig أو a05s_defconfig)'
        required: true
        default: 'vendor/m269-gki_defconfig'

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: ⚙️ إعداد بيئة النظام وتثبيت الحزم المطلوبة
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc flex bison rsync cpio git curl zip unzip \
            python3 python-is-python3 pahole dwarves libelf-dev libssl-dev \
            zlib1g-dev libfl-dev libncurses-dev \
            clang lld llvm llvm-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: 📥 تحميل Proton-Clang (أداة التجميع)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

      - name: 📥 تحميل مصدر النواة (Kernel Source)
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/Hichem299/Kvm.git kernel
          cd kernel
          git submodule update --init --recursive

      - name: 🔍 تحديد مسار msm-kernel
        run: |
          cd kernel
          MSM_PATH="$(find "${GITHUB_WORKSPACE}/kernel" -maxdepth 4 -type d -name "msm-kernel" | head -n 1)"
          if [ -z "$MSM_PATH" ]; then
            echo "msm-kernel not found"
            find "${GITHUB_WORKSPACE}/kernel" -maxdepth 4 -type d | sort
            exit 1
          fi
          echo "MSM_PATH=$MSM_PATH" >> "$GITHUB_ENV"
          echo "Found msm-kernel at: $MSM_PATH"

      - name: 🧹 تنظيف مجلد البناء
        run: |
          cd "${MSM_PATH}"
          make O=out ARCH=arm64 mrproper || true
          rm -rf out
          echo "Build directory cleaned"

      - name: 📝 إنشاء ملف إعدادات KVM
        run: |
          cat > "${GITHUB_WORKSPACE}/kvm.fragment" <<'EOF'
          # KVM Host Support
          CONFIG_KVM=m
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_ARM_PV_TIME=y
          CONFIG_KVM_MMIO=y
          CONFIG_GKI_HIDDEN_VIRTUAL_CONFIGS=y
          CONFIG_GKI_HIDDEN_HYPERVISOR_CONFIGS=y
          CONFIG_SYS_HYPERVISOR=y
          CONFIG_CRYPTO_DEV_VIRTIO=y
          CONFIG_VIRTUALIZATION=y
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_PCI_LIB=y
          CONFIG_VIRTIO_MENU=y
          CONFIG_VIRTIO_PCI=y
          CONFIG_VIRTIO_PCI_LEGACY=y
          CONFIG_VIRTIO_BALLOON=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_ARM64_VHE=y
          CONFIG_ARM64_4K_PAGES=y
          CONFIG_GUNYAH=y
          CONFIG_GUNYAH_PLATFORM=y
          CONFIG_GUNYAH_RESOURCE_MANAGER=y
          CONFIG_QCOM_SCM=y
          CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK=y
          CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
          CONFIG_VIRTIO_DMA_SHARED_BUFFER=y
          CONFIG_VHOST_MENU=y
          CONFIG_VHOST=y
          CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y
          CONFIG_CMDLINE="stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure id_aa64mmfr1.vh=1"
          EOF

      - name: ⚙️ تهيئة النواة (Configure Kernel)
        run: |
          cd "${MSM_PATH}"
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # تشغيل الـ defconfig
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            ${{ github.event.inputs.DEFCONFIG }}

          # دمج إعدادات KVM
          if [ -f "scripts/kconfig/merge_config.sh" ]; then
            bash scripts/kconfig/merge_config.sh -m -O out \
              out/.config "${GITHUB_WORKSPACE}/kvm.fragment"
          else
            cat "${GITHUB_WORKSPACE}/kvm.fragment" >> out/.config
          fi

          # تحديث الإعدادات
          yes "" | make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            oldconfig

          # حفظ الإعدادات النهائية
          cp out/.config "${GITHUB_WORKSPACE}/final.config"
          
          echo "===== إعدادات KVM التي تم تفعيلها ====="
          grep -E '^(CONFIG_VIRTUALIZATION|CONFIG_KVM|CONFIG_KVM_ARM_HOST|CONFIG_KVM_ARM_PMU|CONFIG_VIRTIO|CONFIG_VHOST|CONFIG_ARM64_VHE|CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK)=' \
            out/.config || true

      - name: 🛠️ بناء النواة (Build Kernel)
        run: |
          cd "${MSM_PATH}"
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # بناء النواة
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

      - name: 📄 عرض آخر أسطر log في حال فشل البناء
        if: failure()
        run: |
          set +e
          echo "===== آخر 200 سطر من build.log ====="
          if [ -f "${GITHUB_WORKSPACE}/build.log" ]; then
            tail -n 200 "${GITHUB_WORKSPACE}/build.log"
          else
            echo "build.log غير موجود"
          fi

      - name: 📦 رفع الملفات الناتجة (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A05s-Kernel-with-KVM
          path: |
            kernel/msm-kernel/out/arch/arm64/boot/Image
            kernel/msm-kernel/out/arch/arm64/boot/Image.gz
            kernel/msm-kernel/out/arch/arm64/boot/Image.lz4
            kernel/msm-kernel/out/arch/arm64/boot/dtbs/**/*.dtb
            kernel/msm-kernel/out/*.ko
            kernel/msm-kernel/out/arch/arm64/boot/dtbo.img
            ${GITHUB_WORKSPACE}/final.config
            ${GITHUB_WORKSPACE}/build.log
          continue-on-error: true
          if-no-files-found: warn
