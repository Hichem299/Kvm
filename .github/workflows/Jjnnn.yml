name: Build Kernel SM-A057F (KVM Support)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup Build Environment
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential bc \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            clang-15 lld-15 llvm-15 \
            libssl-dev libfl-dev libelf-dev zlib1g-dev \
            git flex bison cpio rsync python3 python-is-python3

          # ربط clang-15 كـ clang الافتراضي
          sudo ln -sf /usr/bin/clang-15   /usr/bin/clang
          sudo ln -sf /usr/bin/ld.lld-15  /usr/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-ar-15 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-15 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-15 /usr/bin/llvm-objcopy

      - name: Locate msm-kernel
        shell: bash
        run: |
          MSM_PATH=$(find "${GITHUB_WORKSPACE}" -maxdepth 4 -type d -name "msm-kernel" | head -n 1)
          if [ -z "$MSM_PATH" ]; then
            echo "❌ msm-kernel not found"
            find "${GITHUB_WORKSPACE}" -maxdepth 3 -type d | sort
            exit 1
          fi
          echo "✅ msm-kernel: $MSM_PATH"
          echo "MSM_PATH=$MSM_PATH" >> $GITHUB_ENV

      - name: Inject KVM Config (all original settings)
        shell: bash
        run: |
          DEFCONFIG="${MSM_PATH}/arch/arm64/configs/vendor/m269-gki_defconfig"
          if [ ! -f "$DEFCONFIG" ]; then
            echo "❌ Defconfig not found at $DEFCONFIG"
            exit 1
          fi

          # إزالة أي أسطر قديمة لتجنب الازدواجية
          sed -i '/^# KVM Support/d; /^CONFIG_KVM/d; /^CONFIG_GUNYAH/d; /^CONFIG_GH_/d; /^CONFIG_VIRTIO/d; /^CONFIG_VHOST/d' "$DEFCONFIG"

          # إضافة كل إعداداتك الأصلية
          cat << 'EOF' >> "$DEFCONFIG"

# KVM Support (all original options)
CONFIG_KVM=y
CONFIG_KVM_ARM_HOST=y
CONFIG_KVM_ARM_PMU=y
CONFIG_KVM_ARM_PV_TIME=y
CONFIG_GKI_HIDDEN_VIRTUAL_CONFIGS=y
CONFIG_GKI_HIDDEN_HYPERVISOR_CONFIGS=y
CONFIG_SYS_HYPERVISOR=y
CONFIG_CRYPTO_DEV_VIRTIO=y
CONFIG_VIRTIO=y
CONFIG_VIRTIO_PCI_LIB=y
CONFIG_VIRTIO_MENU=y
CONFIG_VIRTIO_PCI=y
CONFIG_VIRTIO_PCI_LEGACY=y
CONFIG_VIRTIO_BALLOON=y
CONFIG_VIRTIO_INPUT=y
CONFIG_VIRTIO_MMIO=y
CONFIG_ARM64_VHE=y
CONFIG_ARM64_4K_PAGES=y
CONFIG_GUNYAH=y
CONFIG_GUNYAH_PLATFORM=y
CONFIG_GH_ARM64_DRV=y
CONFIG_GUNYAH_RESOURCE_MANAGER=y
CONFIG_QCOM_SCM=y
CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK=y
CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
CONFIG_VIRTIO_DMA_SHARED_BUFFER=y
CONFIG_VHOST_MENU=y
CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y
CONFIG_CMDLINE="stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure id_aa64mmfr1.vh=1"
EOF

          echo "✅ All original KVM options added to defconfig"

      - name: Configure Kernel
        shell: bash
        run: |
          cd "${MSM_PATH}"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export LLVM=1

          # بناء التهيئة
          make vendor/m269-gki_defconfig
          make olddefconfig

          # التحقق من وجود أخطاء في التهيئة (مثل خيارات غير معروفة)
          if grep -q "unrecognized" .config; then
            echo "⚠️ Warning: Some config options may be invalid"
          fi

          cp .config "${GITHUB_WORKSPACE}/final.config"
          echo "✅ Kernel configured"

      - name: Build Kernel
        shell: bash
        run: |
          cd "${MSM_PATH}"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export LLVM=1

          make -j$(nproc) 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

          if grep -qE "^make\[.*\]: \*\*\* \[.*\] Error|error:|undefined reference" "${GITHUB_WORKSPACE}/build.log"; then
            echo "❌ Build failed. Last 50 lines:"
            tail -n 50 "${GITHUB_WORKSPACE}/build.log"
            exit 1
          fi

          echo "✅ Kernel built successfully"

      - name: Collect Artifacts
        if: always()
        shell: bash
        run: |
          COLLECT="${GITHUB_WORKSPACE}/artifacts"
          mkdir -p "$COLLECT/dtbs" "$COLLECT/modules"

          find "${MSM_PATH}/arch/arm64/boot" -maxdepth 1 \
            \( -name "Image" -o -name "Image.gz" -o -name "Image.lz4" \) \
            -exec cp {} "$COLLECT/" \; 2>/dev/null || true

          find "${MSM_PATH}/arch/arm64/boot/dts" -name "*.dtb" \
            -exec cp {} "$COLLECT/dtbs/" \; 2>/dev/null || true

          find "${MSM_PATH}" -name "*.ko" \
            -exec cp {} "$COLLECT/modules/" \; 2>/dev/null || true

          cp "${GITHUB_WORKSPACE}/final.config" "$COLLECT/" 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/build.log"    "$COLLECT/" 2>/dev/null || true

          echo "=== Artifacts collected ==="
          find "$COLLECT" -type f | sort

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A057F-KVM-Kernel
          if-no-files-found: warn
          compression-level: 9
          path: artifacts/
