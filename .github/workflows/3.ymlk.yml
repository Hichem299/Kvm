name: Build Kernel SM-A057F (KVM Support)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Hichem299/Kvm
          fetch-depth: 1
          clean: true

      - name: Setup Build Environment
        shell: bash
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm libssl-dev libfl-dev curl unzip git ccache flex bison wget python3 libelf-dev zlib1g-dev cpio rsync

      - name: Locate Kernel Tree
        shell: bash
        run: |
          MSM_PATH="$(find "${GITHUB_WORKSPACE}" -type d -name "msm-kernel" | head -n 1)"
          if [ -z "$MSM_PATH" ]; then exit 1; fi
          echo "MSM_PATH=$MSM_PATH" >> "$GITHUB_ENV"

      - name: Clean and Setup Directories
        shell: bash
        run: |
          cd "${{ env.MSM_PATH }}"
          make ARCH=arm64 mrproper || true
          rm -rf "${GITHUB_WORKSPACE}/out"
          mkdir -p "${GITHUB_WORKSPACE}/out"

      - name: Create Complete KVM Config Fragment
        shell: bash
        run: |
          cat > "${GITHUB_WORKSPACE}/kvm.fragment" <<'EOF'
          # KVM & Virtualization Support
          CONFIG_KVM=m
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_ARM_PV_TIME=y
          CONFIG_GKI_HIDDEN_VIRTUAL_CONFIGS=y
          CONFIG_GKI_HIDDEN_HYPERVISOR_CONFIGS=y
          CONFIG_SYS_HYPERVISOR=y
          CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK=y
          
          # Virtio Support
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_MENU=y
          CONFIG_VIRTIO_PCI=y
          CONFIG_VIRTIO_PCI_LIB=y
          CONFIG_VIRTIO_PCI_LEGACY=y
          CONFIG_VIRTIO_BALLOON=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
          CONFIG_VIRTIO_DMA_SHARED_BUFFER=y
          CONFIG_CRYPTO_DEV_VIRTIO=y
          
          # Vhost & Hardware Specific
          CONFIG_VHOST_MENU=y
          CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y
          CONFIG_ARM64_VHE=y
          CONFIG_ARM64_4K_PAGES=y
          CONFIG_QCOM_SCM=y
          
          # Gunyah Hypervisor Support
          CONFIG_GUNYAH=y
          CONFIG_GUNYAH_PLATFORM=y
          CONFIG_GUNYAH_RESOURCE_MANAGER=y
          
          # Cmdline options
          CONFIG_CMDLINE="stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure id_aa64mmfr1.vh=1"
          EOF

      - name: Build Kernel
        shell: bash
        run: |
          set -e
          cd "${{ env.MSM_PATH }}"
          
          export ARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # استخدام defconfig الأساسي
          make O="${GITHUB_WORKSPACE}/out" ARCH=arm64 vendor/m269-gki_defconfig
          
          # حقن كامل الإعدادات أعلاه
          cat "${GITHUB_WORKSPACE}/kvm.fragment" >> "${GITHUB_WORKSPACE}/out/.config"
          
          # ضبط التبعيات
          make O="${GITHUB_WORKSPACE}/out" ARCH=arm64 olddefconfig
          
          # البناء
          make -j"$(nproc --all)" \
            O="${GITHUB_WORKSPACE}/out" \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee "${GITHUB_WORKSPACE}/out/build.log"

      - name: Upload Kernel Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A057F-KVM-Kernel
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/dts/**/*.dtb
            out/build.log

      - name: Final Cleanup
        if: always()
        run: rm -rf "${GITHUB_WORKSPACE}/out"
