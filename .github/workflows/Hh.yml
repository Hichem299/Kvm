name: Cleanup and Build Setup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Reset and Clean Workspace
        run: |
          git fetch origin
          git reset --hard origin/main
          git clean -fd

      - name: Extract Build Archive
        run: |
          # الانتقال إلى المجلد
          cd kernel_platform
          
          # تثبيت unzip (في حال لم يكن مثبتاً)
          sudo apt-get update && sudo apt-get install -y unzip
          
          # فك الضغط من ملف Build.zip
          if [ -f "Build.zip" ]; then
            unzip -o Build.zip
            echo "تم فك ضغط Build.zip بنجاح داخل kernel_platform"
          else
            echo "خطأ: الملف Build.zip غير موجود في مسار kernel_platform"
            exit 1
          fi
