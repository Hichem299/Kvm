name: Build Kernel SM-A057F (Full KVM)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Hichem299/Kvm
          fetch-depth: 1
          clean: true

      - name: Setup Build Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm libssl-dev libfl-dev curl unzip git ccache flex bison wget python3 libelf-dev zlib1g-dev cpio

      - name: Build Kernel
        run: |
          # البحث عن المجلد الصحيح الذي يحتوي على Makefile الأساسي
          KERNEL_DIR=$(find . -name "Makefile" -exec dirname {} \; | grep "msm-kernel" | head -n 1)
          cd "$KERNEL_DIR"
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          # تنظيف
          make mrproper || true
          
          # توليد الـ Config الأساسي
          make vendor/m269-gki_defconfig
          
          # إضافة الإعدادات الكاملة (KVM, VIRTIO, GUNYAH)
          cat >> .config <<EOF
          CONFIG_KVM=y
          CONFIG_KVM_ARM_HOST=y
          CONFIG_KVM_ARM_PMU=y
          CONFIG_KVM_ARM_PV_TIME=y
          CONFIG_GKI_HIDDEN_VIRTUAL_CONFIGS=y
          CONFIG_GKI_HIDDEN_HYPERVISOR_CONFIGS=y
          CONFIG_SYS_HYPERVISOR=y
          CONFIG_ANDROID_VIRTUALIZATION_FRAMEWORK=y
          CONFIG_VIRTIO=y
          CONFIG_VIRTIO_MENU=y
          CONFIG_VIRTIO_PCI=y
          CONFIG_VIRTIO_PCI_LIB=y
          CONFIG_VIRTIO_PCI_LEGACY=y
          CONFIG_VIRTIO_BALLOON=y
          CONFIG_VIRTIO_INPUT=y
          CONFIG_VIRTIO_MMIO=y
          CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
          CONFIG_VIRTIO_DMA_SHARED_BUFFER=y
          CONFIG_CRYPTO_DEV_VIRTIO=y
          CONFIG_VHOST_MENU=y
          CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y
          CONFIG_ARM64_VHE=y
          CONFIG_ARM64_4K_PAGES=y
          CONFIG_QCOM_SCM=y
          CONFIG_GUNYAH=y
          CONFIG_GUNYAH_PLATFORM=y
          CONFIG_GUNYAH_RESOURCE_MANAGER=y
          CONFIG_CMDLINE="stack_depot_disable=on kasan.stacktrace=off kvm-arm.mode=nvhe cgroup_disable=pressure id_aa64mmfr1.vh=1"
          EOF
          
          # ضبط التبعيات والبناء
          make olddefconfig
          make -j$(nproc --all)

      - name: Upload Kernel Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: A057F-Final-Kernel
          path: |
            **/arch/arm64/boot/Image
            **/arch/arm64/boot/dtb
